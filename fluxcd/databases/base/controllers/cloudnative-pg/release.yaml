apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cnpg
  namespace: flux-system
spec:
  interval: 1h
  chart:
    spec:
      chart: cloudnative-pg
      version: "0.25.0"
      sourceRef:
        kind: HelmRepository
        name: cnpg
        namespace: flux-system
      interval: 1h
  targetNamespace: cnpg-system
  releaseName: cnpg
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    updateStrategy:
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 100%
        maxUnavailable: 0%
    monitoring:
      podMonitorEnabled: true
      grafanaDashboard:
        create: true
