---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sealed-secrets
  namespace: flux-system
spec:
  chart:
    spec:
      chart: sealed-secrets
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: sealed-secrets
        namespace: flux-system
      version: 2.17.0
  install:
    crds: Create
    remediation:
      retries: 3
    timeout: 5m
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
    timeout: 5m
  interval: 1h
  releaseName: sealed-secrets-controller
  storageNamespace: sealed-secrets
  targetNamespace: sealed-secrets
