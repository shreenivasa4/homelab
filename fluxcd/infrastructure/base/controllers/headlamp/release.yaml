---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: flux-system
spec:
  interval: 1h
  chart:
    spec:
      chart: headlamp
      version: "0.39.0"
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      strategy: rollback
  releaseName: headlamp
  targetNamespace: kube-system
  values:
    config:
      inClusterContextName: "homelab-production"
    # hostUsers: false
    # securityContext:
    #   capabilities:
    #     drop:
    #     - ALL
    #   readOnlyRootFilesystem: true
    #   runAsNonRoot: true
    #   privileged: false
    #   runAsUser: 100
    #   runAsGroup: 101
    #   allowPrivilegeEscalation: false
    #   seccompProfile:
    #     type: RuntimeDefault
    ingress:
      enabled: true
      annotations:
        external-dns.alpha.kubernetes.io/target: "26016222-ecef-4643-b9b5-0a28c04de49c.cfargotunnel.com"
        external-dns.alpha.kubernetes.io/hostname: headlamp.hariharanep4.space
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
      ingressClassName: "nginx"
      hosts:
      - host: headlamp.hariharanep4.space
        paths:
        - path: /
          type: ImplementationSpecific
