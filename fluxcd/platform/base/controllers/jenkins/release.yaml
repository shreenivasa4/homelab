apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jenkins
  namespace: flux-system
spec:
  interval: 1h0m0s
  releaseName: jenkins
  chart:
    spec:
      chart: jenkins
      version: 5.9.25
      sourceRef:
        kind: HelmRepository
        name: jenkins
        namespace: flux-system
      reconcileStrategy: ChartVersion
  install:
    remediation:
      retries: 3
    timeout: 10m
  upgrade:
    remediation:
      retries: 3
    timeout: 10m
  storageNamespace: flux-system
  targetNamespace: jenkins
  values:
    controller:
      resources:
        requests:
          cpu: "500m"
          memory: "512Mi"
        limits:
          cpu: "2000m"
          memory: "4096Mi"
      fsGroupChangePolicy: Always
      ingress:
        enabled: true
        pathType: ImplementationSpecific
        annotations:
          external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
          external-dns.alpha.kubernetes.io/hostname: jenkins.hariharanep4.space
          external-dns.alpha.kubernetes.io/target: 26016222-ecef-4643-b9b5-0a28c04de49c.cfargotunnel.com
          nginx.ingress.kubernetes.io/backend-protocol: HTTP
          nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
        ingressClassName: nginx
        path: /
        hostName: jenkins.hariharanep4.space
    persistence:
      enabled: true
      storageClass: longhorn
      size: "20Gi"
